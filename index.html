<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio & Live Project Tracker</title>
  <!-- Tailwind CSS for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">

  <!-- Header / Intro -->
  <header class="border-b border-slate-800 bg-slate-950/50 backdrop-blur sticky top-0 z-50">
    <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-xl font-bold tracking-tight text-white">Dev<span class="text-indigo-500">Log</span> & Portfolio</h1>
      <a href="#active-project" class="text-sm bg-indigo-600 hover:bg-indigo-500 text-white font-medium px-4 py-2 rounded-lg transition">
        Current Work
      </a>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-10 space-y-12">

    <!-- Hero Section -->
    <section class="text-center max-w-2xl mx-auto space-y-4">
      <h2 class="text-4xl font-extrabold text-white sm:text-5xl">Building & Logging in Public</h2>
      <p class="text-slate-400 text-lg">
        Welcome! Here is a live breakdown of what I'm currently working on, along with a showcase of my past projects.
      </p>
    </section>

    <!-- SECTION 1: Active Project Tracker -->
    <section id="active-project" class="bg-slate-800/60 border border-slate-700/60 rounded-2xl p-6 sm:p-8 shadow-xl">
      <div class="flex items-center justify-between mb-6">
        <div class="flex items-center space-x-3">
          <span class="relative flex h-3 w-3">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
          </span>
          <h3 class="text-xl font-bold text-white">Active Project Status</h3>
        </div>
        <span id="last-updated" class="text-xs text-slate-400"></span>
      </div>

      <div id="active-project-container" class="space-y-6">
        <!-- Injected via JavaScript -->
      </div>
    </section>

    <!-- SECTION 2: Portfolio -->
    <section class="space-y-6">
      <div class="border-b border-slate-800 pb-4">
        <h3 class="text-2xl font-bold text-white">Portfolio & Past Projects</h3>
        <p class="text-slate-400 text-sm">Other completed and ongoing work.</p>
      </div>

      <div id="portfolio-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Injected via JavaScript -->
      </div>
    </section>

  </main>

  <!-- DATA & LOGIC SCRIPT -->
  <script>
    // =========================================================================
    // EDIT YOUR DATA HERE TO UPDATE THE WEBSITE ACCORDINGLY!
    // =========================================================================

    const ACTIVE_PROJECT = {
      title: "Heat Transfer Numerical Simulation",
      status: "In Progress", // Options: "In Progress", "Testing", "On Hold"
      lastUpdated: "Today",
      progress: 70, // Percentage 0-100
      description: "Developing C++ modules using LU decomposition to compute steady-state temperature distributions and validating against analytical models.",
      milestones: [
        { name: "Core Algorithm & LU Solver", completed: true },
        { name: "Boundary Condition Implementation", completed: true },
        { name: "Data Visualization & Analytical Comparisons", completed: false },
        { name: "Final Documentation & Report", completed: false }
      ]
    };

    const PORTFOLIO_PROJECTS = [
      {
        title: "Numerical Analysis Suite",
        category: "C++ / Scientific Computing",
        description: "A collection of linear algebra solvers and iterative methods optimized for performance.",
        tags: ["C++", "Algorithms", "Linear Algebra"],
        status: "Completed",
        link: "#"
      },
      {
        title: "Data Visualization Dashboard",
        category: "Web Development",
        description: "Interactive charting tool to plot complex simulation outputs against analytical formulas.",
        tags: ["JavaScript", "HTML/CSS", "Charts"],
        status: "Completed",
        link: "#"
      },
      {
        title: "Future Engineering App",
        category: "Software",
        description: "Upcoming project focused on automating physics calculations and simulation workflows.",
        tags: ["Planned"],
        status: "Planned",
        link: "#"
      }
    ];

    // =========================================================================
    // RENDERING LOGIC (DO NOT NEED TO EDIT UNLESS CUSTOMIZING LAYOUT)
    // =========================================================================

    function renderActiveProject() {
      const container = document.getElementById('active-project-container');
      document.getElementById('last-updated').innerText = `Last updated: ${ACTIVE_PROJECT.lastUpdated}`;

      const milestonesHTML = ACTIVE_PROJECT.milestones.map(m => `
        <li class="flex items-center space-x-3 text-sm">
          <span class="flex-shrink-0 w-5 h-5 rounded-full ${m.completed ? 'bg-emerald-500/20 text-emerald-400' : 'bg-slate-700 text-slate-500'} flex items-center justify-center font-bold text-xs">
            ${m.completed ? '✓' : '○'}
          </span>
          <span class="${m.completed ? 'text-slate-200 line-through decoration-slate-500' : 'text-slate-400'}">${m.name}</span>
        </li>
      `).join('');

      container.innerHTML = `
        <div class="space-y-4">
          <div class="flex justify-between items-start">
            <h4 class="text-2xl font-bold text-white">${ACTIVE_PROJECT.title}</h4>
            <span class="px-3 py-1 bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 rounded-full text-xs font-semibold">
              ${ACTIVE_PROJECT.status}
            </span>
          </div>
          <p class="text-slate-300">${ACTIVE_PROJECT.description}</p>
          
          <!-- Progress Bar -->
          <div class="space-y-2 pt-2">
            <div class="flex justify-between text-xs font-semibold">
              <span class="text-slate-400">Completion</span>
              <span class="text-indigo-400">${ACTIVE_PROJECT.progress}%</span>
            </div>
            <div class="w-full bg-slate-700 rounded-full h-2.5 overflow-hidden">
              <div class="bg-indigo-500 h-2.5 rounded-full transition-all duration-500" style="width: ${ACTIVE_PROJECT.progress}%"></div>
            </div>
          </div>

          <!-- Milestones Checklist -->
          <div class="pt-4 border-t border-slate-700/50">
            <h5 class="text-xs uppercase tracking-wider text-slate-400 font-semibold mb-3">Key Milestones</h5>
            <ul class="grid grid-cols-1 sm:grid-cols-2 gap-3">
              ${milestonesHTML}
            </ul>
          </div>
        </div>
      `;
    }

    function renderPortfolio() {
      const container = document.getElementById('portfolio-grid');
      container.innerHTML = PORTFOLIO_PROJECTS.map(item => `
        <div class="bg-slate-800/40 border border-slate-800 rounded-xl p-5 hover:border-slate-700 transition flex flex-col justify-between space-y-4">
          <div class="space-y-2">
            <div class="flex justify-between items-center">
              <span class="text-xs font-medium text-indigo-400">${item.category}</span>
              <span class="text-xs text-slate-500">${item.status}</span>
            </div>
            <h4 class="text-lg font-bold text-white">${item.title}</h4>
            <p class="text-slate-400 text-sm">${item.description}</p>
          </div>
          <div class="pt-4 border-t border-slate-800/60 flex items-center justify-between">
            <div class="flex flex-wrap gap-1">
              ${item.tags.map(t => `<span class="bg-slate-700/50 text-slate-300 text-[10px] px-2 py-0.5 rounded">${t}</span>`).join('')}
            </div>
            <a href="${item.link}" class="text-xs text-indigo-400 hover:underline">View →</a>
          </div>
        </div>
      `).join('');
    }

    // Initial Render
    renderActiveProject();
    renderPortfolio();
  </script>
</body>
</html>
